<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লগইন ও রেজিস্ট্রেশন</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Noto Sans Bengali', sans-serif;
            background-color: #020617;
            overflow: hidden;
        }

        /* Three.js Canvas Container */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Wrapper Overlay */
        .auth-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, rgba(2,6,23,0.3), rgba(2,6,23,0.6));
            overflow-y: auto;
            padding: 20px;
        }

        /* Glassmorphism Transparent Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            color: white;
            transition: all 0.3s ease;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
            padding: 12px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .btn-custom {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
        }

        .switch-form-link {
            color: #60a5fa;
            text-decoration: none;
            cursor: pointer;
        }

        .switch-form-link:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        .alert-custom {
            border-radius: 10px;
            font-size: 0.9rem;
            text-center: center;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="auth-overlay">
        
        <div class="glass-card" id="login-box">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-white mb-1">স্বাগতম!</h2>
                <p class="text-white-50 small">PhysicsMaster অ্যাকাউন্টে লগইন করুন</p>
            </div>
            
            <div id="loginAlert" class="alert alert-danger alert-custom hidden"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-white-50">মোবাইল নম্বর / ইউজার আইডি</label>
                    <input type="text" id="loginUserId" class="form-control" placeholder="017XXXXXXXX" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-white-50">পাসওয়ার্ড</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-custom w-100 mb-3" id="loginSubmitBtn">লগইন করুন</button>
                <p class="text-center small mb-0 text-white-50">নতুন শিক্ষার্থী? <span class="switch-form-link" onclick="toggleForm()">রেজিস্ট্রেশন করো</span></p>
            </form>
        </div>

        <div class="glass-card hidden" id="register-box">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-white mb-1">রেজিস্ট্রেশন 🚀</h2>
                <p class="text-white-50 small">ফিজিক্সের আঙিনায় যুক্ত হতে তথ্য দিন</p>
            </div>
            
            <div id="regAlert" class="alert alert-custom hidden"></div>

            <form id="registrationForm">
                <input type="hidden" name="action" value="register">
                
                <div class="mb-2">
                    <label class="form-label small fw-semibold text-white-50">শিক্ষার্থীর নাম</label>
                    <input type="text" name="name" class="form-control" placeholder="আপনার নাম লিখুন" required>
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-semibold text-white-50">মোবাইল নম্বর</label>
                    <input type="tel" name="phone" class="form-control" placeholder="017XXXXXXXX" required>
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-semibold text-white-50">শ্রেণি</label>
                    <select name="class" class="form-control form-select" style="background-color: #1e293b; color:white;" required>
                        <option value="" disabled selected>শ্রেণি নির্বাচন করুন</option>
                        <option value="SSC">SSC (নবম-দশম)</option>
                        <option value="HSC">HSC (একাদশ-দ্বাদশ)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-white-50">পাসওয়ার্ড সেট করুন</label>
                    <input type="password" name="password" class="form-control" placeholder="নূন্যতম ৬ ডিজিট" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-custom w-100 mb-3" id="regSubmitBtn">রেজিস্ট্রেশন সম্পন্ন করো</button>
                <p class="text-center small mb-0 text-white-50">ইতিমধ্যে অ্যাকাউন্ট আছে? <span class="switch-form-link" onclick="toggleForm()">লগইন করুন</span></p>
            </form>
        </div>

    </div>

    <script>
        // আপনার গুগল অ্যাপস স্ক্রিপ্ট ডেপ্লয়মেন্ট ওয়েব অ্যাপ URL (এখানে আপনার আসল URL টি বসাবেন)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTXhfGSa8Eanzxp9ltJNj8v7iEWeOy1R_n7ABN_awl7Tf_0D54OY8vjVZRThMjc0C9/exec";

        // Form Toggle Handler
        function toggleForm() {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('register-box').classList.toggle('hidden');
            document.getElementById('loginAlert').classList.add('hidden');
            document.getElementById('regAlert').classList.add('hidden');
        }

        // --- Three.js 3D Space & Solar Model Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 2, 300);
        scene.add(sunLight);

        // 1. Create Sun (সৌরজগতের কেন্দ্র)
        const sunGeo = new THREE.SphereGeometry(1.2, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);

        // 2. Create Planets (গ্রহসমূহ)
        const planets = [];
        const planetData = [
            { size: 0.2, distance: 2.5, color: 0x888888, speed: 0.02 }, // বুধ
            { size: 0.35, distance: 4.0, color: 0xe3bb76, speed: 0.01 }, // শুক্র
            { size: 0.4, distance: 6.0, color: 0x2b82c9, speed: 0.011 }, // পৃথিবী
            { size: 0.3, distance: 8.0, color: 0xc1440e, speed: 0.006 }   // মঙ্গল
        ];

        planetData.forEach(data => {
            const orbitGeo = new THREE.RingGeometry(data.distance - 0.02, data.distance + 0.02, 64);
            const orbitMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.08 });
            const orbit = new THREE.Mesh(orbitGeo, orbitMat);
            orbit.rotation.x = Math.PI / 2;
            scene.add(orbit);

            const planetGeo = new THREE.SphereGeometry(data.size, 24, 24);
            const planetMat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.8 });
            const planet = new THREE.Mesh(planetGeo, planetMat);
            
            planets.push({
                mesh: planet,
                distance: data.distance,
                speed: data.speed,
                angle: Math.random() * Math.PI * 2
            });
            scene.add(planet);
        });

        // 3. Shooting / Moving Stars (ছুটন্ত তারা)
        const starsCount = 800;
        const starsGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(starsCount * 3);
        const velocities = [];

        for(let i=0; i<starsCount * 3; i+=3) {
            positions[i] = (Math.random() - 0.5) * 30;
            positions[i+1] = (Math.random() - 0.5) * 30;
            positions[i+2] = (Math.random() - 0.5) * 30;

            velocities.push({
                x: (Math.random() - 0.5) * 0.02,
                y: (Math.random() - 0.5) * 0.02,
                z: (Math.random() - 0.5) * 0.02
            });
        }

        starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.04, transparent: true, opacity: 0.8 });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // Animation Loop
        const animate = () => {
            requestAnimationFrame(animate);

            sun.rotation.y += 0.002;
            planets.forEach(p => {
                p.angle += p.speed;
                p.mesh.position.x = Math.cos(p.angle) * p.distance;
                p.mesh.position.z = Math.sin(p.angle) * p.distance;
                p.mesh.rotation.y += 0.01;
            });

            scene.rotation.y += 0.0005;

            const positionsArr = starField.geometry.attributes.position.array;
            let vIndex = 0;
            for(let i=0; i<starsCount * 3; i+=3) {
                positionsArr[i] += velocities[vIndex].x;
                positionsArr[i+1] += velocities[vIndex].y;
                positionsArr[i+2] += velocities[vIndex].z;

                if (Math.abs(positionsArr[i]) > 15) positionsArr[i] = -positionsArr[i];
                if (Math.abs(positionsArr[i+1]) > 15) positionsArr[i+1] = -positionsArr[i+1];
                if (Math.abs(positionsArr[i+2]) > 15) positionsArr[i+2] = -positionsArr[i+2];
                vIndex++;
            }
            starField.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        };
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });


        // ==========================================
        //  ফাইল ইন্টিগ্রেশন ফাংশনালিটি (Backend Connection)
        // ==========================================

        // --- ক) লগইন ফাংশন (doGet লজিক অনুসারী) ---
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userId = document.getElementById('loginUserId').value;
            const password = document.getElementById('loginPassword').value;
            const loginSubmitBtn = document.getElementById('loginSubmitBtn');
            const loginAlert = document.getElementById('loginAlert');

            loginSubmitBtn.innerText = "যাচাই করা হচ্ছে...";
            loginSubmitBtn.disabled = true;
            loginAlert.classList.add('hidden');

            // code.gs এর doGet শর্ত অনুযায়ী কুয়েরি প্যারামিটার তৈরি করা হলো
            const loginUrl = `${SCRIPT_URL}?action=login&userId=${encodeURIComponent(userId)}&password=${encodeURIComponent(password)}`;

            fetch(loginUrl)
            .then(response => response.json())
            .then(data => {
                loginSubmitBtn.innerText = "লগইন করুন";
                loginSubmitBtn.disabled = false;

                if (data.result === "success") {
                    loginAlert.classList.remove('hidden', 'alert-danger');
                    loginAlert.classList.add('alert-success');
                    loginAlert.innerText = `সফল লগইন! স্বাগতম ${data.name} (${data.className})`;
                    
                    // সেশন স্টোরেজে ডেটা সেভ করে ড্যাশবোর্ডে রিডাইরেক্ট করতে পারেন
                    sessionStorage.setItem("studentName", data.name);
                    sessionStorage.setItem("studentClass", data.className);
                    
                    // উদাহরণস্বরূপ ড্যাশবোর্ডে নিয়ে যাওয়ার কম্যান্ড:
                     window.location.href = "dashboard.html";
                } else {
                    loginAlert.classList.remove('hidden', 'alert-success');
                    loginAlert.classList.add('alert-danger');
                    loginAlert.innerText = data.message || "ইউজার আইডি বা পাসওয়ার্ড ভুল!";
                }
            })
            .catch(error => {
                console.error('Error!', error);
                loginSubmitBtn.innerText = "লগইন করুন";
                loginSubmitBtn.disabled = false;
                loginAlert.classList.remove('hidden');
                loginAlert.classList.add('alert-danger');
                loginAlert.innerText = "সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না। আবার চেষ্টা করুন।";
            });
        });


        // --- খ) রেজিস্ট্রেশন ফাংশন (doPost লজিক অনুসারী) ---
        const regForm = document.getElementById('registrationForm');
        regForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const regSubmitBtn = document.getElementById('regSubmitBtn');
            const regAlert = document.getElementById('regAlert');
            
            regSubmitBtn.innerText = "প্রসেসিং হচ্ছে...";
            regSubmitBtn.disabled = true;
            regAlert.classList.add('hidden');

            // FormData-কে URL-Encoded বা প্যারামিটার ফরমেটে পাঠানো (doPost-এর e.parameter রিড করার জন্য)
            const formData = new FormData(regForm);
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                regSubmitBtn.innerText = "রেজিস্ট্রেশন সম্পন্ন করো";
                regSubmitBtn.disabled = false;

                if (data.result === "success") {
                    regAlert.classList.remove('hidden', 'alert-danger');
                    regAlert.classList.add('alert-success');
                    regAlert.innerText = "অভিনন্দন! তোমার রেজিস্ট্রেশন ডেটা গুগল শিটে সফলভাবে জমা হয়েছে।";
                    regForm.reset();
                    
                    // ৩ সেকেন্ড পর স্বয়ংক্রিয়ভাবে লগইন স্ক্রিনে ফিরিয়ে নিয়ে যাবে
                    setTimeout(toggleForm, 3000);
                } else {
                    regAlert.classList.remove('hidden', 'alert-success');
                    regAlert.classList.add('alert-danger');
                    regAlert.innerText = data.message || "রেজিস্ট্রেশন ব্যর্থ হয়েছে।";
                }
            })
            .catch(error => {
                console.error('Error!', error);
                regSubmitBtn.innerText = "আবার চেষ্টা করো";
                regSubmitBtn.disabled = false;
                regAlert.classList.remove('hidden');
                regAlert.classList.add('alert-danger');
                regAlert.innerText = "কোনো একটি সমস্যা হয়েছে! নেটওয়ার্ক চেক করুন।";
            });
        });
    </script>
</body>
</html>
