<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Noto Sans Bengali', sans-serif; background-color: #020617;
            background-image: url('physics_bg.jpg');  background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;
        }

        /* UI Wrapper Overlay - Added to ensure content is readable against BG */
        .auth-overlay { width: 100%; min-height: 100%; display: flex; justify-content: center; align-items: center;
             background: linear-gradient(to bottom, rgba(2,6,23,0.5), rgba(2,6,23,0.8)); padding: 40px 20px;
        }

        /* Glassmorphism Transparent Card */
        .glass-card { background: rgba(255, 255, 255, 0.08);  backdrop-filter: blur(16px);  -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 24px; padding: 40px;  width: 100%; max-width: 450px; box-shadow: 0 25px 60px rgba(237, 235, 235, 0.508);  color: white;  transition: all 0.3s ease;
        }

        .form-control { background: rgba(255, 255, 255, 0.15);  border: 1px solid rgba(255, 255, 255, 0.2); color: white; border-radius: 10px; padding: 12px; }

        .form-control:focus { background: rgba(255, 255, 255, 0.2);  border-color: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);}
        
        .form-label { color: #f1f5f9; /* Slate 100 - clear white-ish */}

        .btn-custom {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8); border: none; color: white; padding: 12px; border-radius: 10px;
            font-weight: bold; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        .btn-custom:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5); background: linear-gradient(135deg, #1d4ed8, #1e40af); }
        .switch-form-link { color: #60a5fa; text-decoration: none; cursor: pointer;  font-weight: 500; }
        .switch-form-link:hover {  text-decoration: underline;  color: #93c5fd; }
        .hidden {  display: none !important; }
        .alert-custom { border-radius: 10px; font-size: 0.9rem; text-align: center;  border: none;  box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        /* Adjust bootstrap select background color */
        .form-select.form-control { appearance: none;  -webkit-appearance: none;  -moz-appearance: none;   background-color: rgba(255, 255, 255, 0.15);   color: white; }
        .form-select.form-control option {  background-color: #1e293b;  color: white; }

    </style>
</head>
<body>

    <div class="auth-overlay">
        
        <div class="glass-card" id="login-box">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-white mb-1">স্বাগতম!</h2>
                <p class="text-white-50 small">PhysicsMaster অ্যাকাউন্টে লগইন করুন</p>
            </div>
            
            <div id="loginAlert" class="alert alert-danger alert-custom hidden"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">মোবাইল নম্বর / ইউজার আইডি</label>
                    <input type="text" id="loginUserId" class="form-control" placeholder="017XXXXXXXX" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold">পাসওয়ার্ড</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-custom w-100 mb-3" id="loginSubmitBtn">লগইন করুন</button>
                <p class="text-center small mb-0 text-white-50">নতুন শিক্ষার্থী? <span class="switch-form-link" onclick="toggleForm()">রেজিস্ট্রেশন করো</span></p>
            </form>
        </div>

        <div class="glass-card hidden" id="register-box">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-white mb-1">রেজিস্ট্রেশন 🚀</h2>
                <p class="text-white-50 small">Physics World এ প্রবেশ করতে তথ্য দিন</p>
            </div>
            
            <div id="regAlert" class="alert alert-custom hidden"></div>

            <form id="registrationForm">
                <input type="hidden" name="action" value="register">
                
                <div class="mb-2">
                    <label class="form-label small fw-semibold">শিক্ষার্থীর নাম</label>
                    <input type="text" name="name" class="form-control" placeholder="আপনার নাম লিখুন" required>
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-semibold">মোবাইল নম্বর</label>
                    <input type="tel" name="phone" class="form-control" placeholder="017XXXXXXXX" required>
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-semibold">শ্রেণি</label>
                    <select name="class" class="form-control form-select" required>
                        <option value="" disabled selected>শ্রেণি নির্বাচন করুন</option>
                        <option value="SSC">SSC (নবম-দশম)</option>
                        <option value="HSC">HSC (একাদশ-দ্বাদশ)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">পাসওয়ার্ড সেট করুন</label>
                    <input type="password" name="password" class="form-control" placeholder="নূন্যতম ৬ ডিজিট" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-custom w-100 mb-3" id="regSubmitBtn">রেজিস্ট্রেশন সম্পন্ন করো</button>
                <p class="text-center small mb-0 text-white-50">ইতিমধ্যে অ্যাকাউন্ট আছে? <span class="switch-form-link" onclick="toggleForm()">লগইন করুন</span></p>
            </form>
        </div>

    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTXhfGSa8Eanzxp9ltJNj8v7iEWeOy1R_n7ABN_awl7Tf_0D54OY8vjVZRThMjc0C9/exec";

        // Form Toggle Handler
        function toggleForm() {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('register-box').classList.toggle('hidden');
            document.getElementById('loginAlert').classList.add('hidden');
            document.getElementById('regAlert').classList.add('hidden');
        }

        // --- ক) লগইন ফাংশন (doGet লজিক অনুসারী) ---
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userId = document.getElementById('loginUserId').value;
            const password = document.getElementById('loginPassword').value;
            const loginSubmitBtn = document.getElementById('loginSubmitBtn');
            const loginAlert = document.getElementById('loginAlert');

            loginSubmitBtn.innerText = "যাচাই করা হচ্ছে...";
            loginSubmitBtn.disabled = true;
            loginAlert.classList.add('hidden');

            const loginUrl = `${SCRIPT_URL}?action=login&userId=${encodeURIComponent(userId)}&password=${encodeURIComponent(password)}`;

            fetch(loginUrl)
            .then(response => response.json())
            .then(data => {
                loginSubmitBtn.innerText = "লগইন করুন";
                loginSubmitBtn.disabled = false;

                if (data.result === "success") {
                    loginAlert.classList.remove('hidden', 'alert-danger');
                    loginAlert.classList.add('alert-success');
                    loginAlert.innerText = `সফল লগইন! স্বাগতম ${data.name} (${data.className})`;
                    
                    sessionStorage.setItem("studentName", data.name);
                    sessionStorage.setItem("studentClass", data.className);
                    
                    window.location.href = "dashboard.html";
                } else {
                    loginAlert.classList.remove('hidden', 'alert-success');
                    loginAlert.classList.add('alert-danger');
                    loginAlert.innerText = data.message || "ইউজার আইডি বা পাসওয়ার্ড ভুল!";
                }
            })
            .catch(error => {
                console.error('Error!', error);
                loginSubmitBtn.innerText = "লগইন করুন";
                loginSubmitBtn.disabled = false;
                loginAlert.classList.remove('hidden');
                loginAlert.classList.add('alert-danger');
                loginAlert.innerText = "সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না। আবার চেষ্টা করুন।";
            });
        });

        // --- খ) রেজিস্ট্রেশন ফাংশন (doPost লজিক অনুসারী) ---
        const regForm = document.getElementById('registrationForm');
        regForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const regSubmitBtn = document.getElementById('regSubmitBtn');
            const regAlert = document.getElementById('regAlert');
            
            regSubmitBtn.innerText = "প্রসেসিং হচ্ছে...";
            regSubmitBtn.disabled = true;
            regAlert.classList.add('hidden');

            const formData = new FormData(regForm);
            
            fetch(SCRIPT_URL, {  method: 'POST',   body: formData })
            .then(response => response.json())
            .then(data => {
                regSubmitBtn.innerText = "রেজিস্ট্রেশন সম্পন্ন করো";
                regSubmitBtn.disabled = false;

                if (data.result === "success") {
                    regAlert.classList.remove('hidden', 'alert-danger');
                    regAlert.classList.add('alert-success');
                    regAlert.innerText = "অভিনন্দন! তোমার রেজিস্ট্রেশন সফলভাবে সম্পন্ন হয়েছে।";
                    regForm.reset();
                    
                    setTimeout(toggleForm, 3000);
                } else {
                    regAlert.classList.remove('hidden', 'alert-success');
                    regAlert.classList.add('alert-danger');
                    regAlert.innerText = data.message || "রেজিস্ট্রেশন ব্যর্থ হয়েছে।";
                }
            })
            .catch(error => {
                console.error('Error!', error);
                regSubmitBtn.innerText = "আবার চেষ্টা করো";
                regSubmitBtn.disabled = false;
                regAlert.classList.remove('hidden');
                regAlert.classList.add('alert-danger');
                regAlert.innerText = "কোনো একটি সমস্যা হয়েছে! নেটওয়ার্ক চেক করুন।";
            });
        });
    </script>
</body>
</html>
